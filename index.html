<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Consignado">
<title>Consignado App</title>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  :root {
    --bg:#0f0f12; --bg2:#18181f; --bg3:#22222c; --surface:#1e1e28;
    --border:#2e2e3d; --accent:#6c63ff; --accent2:#a78bfa;
    --green:#22c55e; --red:#ef4444; --amber:#f59e0b;
    --text:#f0f0f5; --text2:#9999b3; --text3:#5a5a75;
    --radius:14px; --radius-sm:8px;
    --font:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100dvh;}
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0;}
  .header-title{font-size:18px;font-weight:700;letter-spacing:-0.4px;}
  .header-sub{font-size:12px;color:var(--text2);margin-top:1px;}
  .content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
  .nav{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer;border:none;background:none;color:var(--text2);font-size:10px;font-family:var(--font);transition:color .15s;}
  .nav-btn.active{color:var(--accent2);}
  .nav-btn .icon{font-size:22px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;width:100%;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-sm{padding:8px 14px;font-size:13px;width:auto;}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;}
  .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;}
  .form-input:focus{border-color:var(--accent);}
  .form-input::placeholder{color:var(--text3);}
  /* Scanner */
  .scan-box{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;aspect-ratio:4/3;margin-bottom:4px;}
  .scan-box video{width:100%;height:100%;object-fit:cover;display:block;}
  .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .scan-frame{width:58%;height:58%;position:relative;}
  .sc{position:absolute;width:22px;height:22px;border-color:var(--accent2);border-style:solid;}
  .sc.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
  .sc.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
  .sc.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
  .sc.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
  .scan-line{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);animation:scanline 2s linear infinite;top:0;}
  @keyframes scanline{0%{top:0}100%{top:100%}}
  .scan-status{text-align:center;font-size:14px;color:var(--text2);margin-bottom:12px;}
  /* Items */
  .item-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .item-row:last-child{border-bottom:none;}
  .item-icon{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .item-info{flex:1;min-width:0;}
  .item-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-code{font-size:12px;color:var(--text2);font-family:monospace;margin-top:2px;}
  .item-price{font-size:16px;font-weight:700;color:var(--green);flex-shrink:0;}
  /* Client card */
  .client-card{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:border-color .15s;}
  .client-card:hover{border-color:var(--accent);}
  .client-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;color:#fff;}
  .client-name{font-size:15px;font-weight:600;}
  .client-phone{font-size:13px;color:var(--text2);margin-top:2px;}
  .client-total{font-size:13px;color:var(--green);font-weight:600;}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;z-index:100;animation:fadeIn .15s;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;width:100%;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:90dvh;overflow-y:auto;animation:slideUp .2s;}
  @keyframes slideUp{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .modal-title{font-size:20px;font-weight:700;margin-bottom:6px;}
  .modal-sub{font-size:14px;color:var(--text2);margin-bottom:20px;}
  /* Toast */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:30px;padding:10px 20px;font-size:14px;font-weight:500;z-index:200;white-space:nowrap;animation:toastIn .2s;}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .toast.success{border-color:var(--green);color:var(--green);}
  .toast.error{border-color:var(--red);color:var(--red);}
  /* Total bar */
  .total-bar{background:var(--bg2);border-top:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .total-label{font-size:14px;color:var(--text2);}
  .total-value{font-size:24px;font-weight:800;color:var(--green);letter-spacing:-0.5px;}
  /* Empty */
  .empty{text-align:center;padding:48px 24px;color:var(--text2);}
  .empty .icon{font-size:48px;margin-bottom:12px;}
  .empty p{font-size:15px;}
  /* Qty */
  .qty-ctrl{display:flex;align-items:center;gap:10px;}
  .qty-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .qty-num{font-size:15px;font-weight:700;min-width:20px;text-align:center;}
  /* Mode bar */
  .mode-bar{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;gap:4px;margin-bottom:16px;}
  .mode-opt{flex:1;padding:8px;border-radius:6px;border:none;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;background:none;color:var(--text2);transition:all .15s;}
  .mode-opt.active{background:var(--accent);color:#fff;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .row{display:flex;gap:10px;}
  .row .form-group{flex:1;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .scan-icon-btn{flex-shrink:0;width:44px;height:44px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">📦 Consignado</div>
    <div class="header-sub" id="header-sub">Selecione um cliente para iniciar</div>
  </div>
  <div class="content" id="main-content"></div>
  <div id="total-slot"></div>
  <div class="nav">
    <button class="nav-btn active" id="nav-scan"     onclick="showTab('scan')">    <span class="icon">⚡</span>Escanear</button>
    <button class="nav-btn"        id="nav-clients"  onclick="showTab('clients')"> <span class="icon">👥</span>Clientes</button>
    <button class="nav-btn"        id="nav-products" onclick="showTab('products')"><span class="icon">🏷️</span>Produtos</button>
    <button class="nav-btn"        id="nav-orders"   onclick="showTab('orders')">  <span class="icon">📋</span>Pedidos</button>
    <button class="nav-btn"        id="nav-settings" onclick="showTab('settings')"><span class="icon">⚙️</span>Config</button>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  products: JSON.parse(localStorage.getItem('csn_products') || '{}'),
  clients:  JSON.parse(localStorage.getItem('csn_clients')  || '{}'),
  orders:   JSON.parse(localStorage.getItem('csn_orders')   || '{}'),
  activeClient: null,
  scanMode: 'sale',
  currentTab: 'scan'
};
function save() {
  localStorage.setItem('csn_products', JSON.stringify(state.products));
  localStorage.setItem('csn_clients',  JSON.stringify(state.clients));
  localStorage.setItem('csn_orders',   JSON.stringify(state.orders));
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function fmt(v)     { return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }
function initials(n){ return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => el.remove(), 2800);
}
function showModal(html) {
  document.getElementById('modal-root').innerHTML =
    `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() {
  _stopModalScan();
  document.getElementById('modal-root').innerHTML = '';
}

// ── SCANNER ENGINE ────────────────────────────────────────────────────────────
// Single shared stream — only one camera active at a time.
// Uses native BarcodeDetector where available (Chrome/Android),
// falls back to ZXing (iOS Safari, Firefox).

let _stream    = null;
let _running   = false;
let _rafId     = null;
let _zxReader  = null;

function _getZX() {
  if (!_zxReader) _zxReader = new ZXing.BrowserMultiFormatReader();
  return _zxReader;
}

async function _stopStream() {
  _running = false;
  if (_rafId)  { cancelAnimationFrame(_rafId); _rafId = null; }
  if (_stream) { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
  if (_zxReader) { try { _zxReader.reset(); } catch(e){} }
  await new Promise(r => setTimeout(r, 100));
}

async function _startScan(videoId, onCode) {
  await _stopStream();
  const video = document.getElementById(videoId);
  if (!video) return;

  try {
    _stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = _stream;
    video.setAttribute('playsinline', '');
    video.muted = true;
    await video.play();
    _running = true;

    let _lastCode = '', _lastTime = 0;
    function _emit(code) {
      const now = Date.now();
      if (code === _lastCode && now - _lastTime < 2000) return;
      _lastCode = code; _lastTime = now;
      onCode(code);
    }

    if ('BarcodeDetector' in window) {
      const det = new BarcodeDetector({
        formats: ['qr_code','ean_13','ean_8','code_128','code_39',
                  'upc_a','upc_e','itf','data_matrix','aztec','pdf417','codabar']
      });
      const loop = async () => {
        if (!_running) return;
        try {
          const res = await det.detect(video);
          if (res.length) _emit(res[0].rawValue);
        } catch(e) {}
        if (_running) _rafId = requestAnimationFrame(loop);
      };
      _rafId = requestAnimationFrame(loop);
    } else {
      _getZX().decodeFromStream(_stream, video, (result) => {
        if (result && _running) _emit(result.getText());
      });
    }
  } catch (err) {
    _running = false;
    if (err.name === 'NotAllowedError') {
      _showCamOverlay(
        'O navegador bloqueou o acesso à câmera.<br><br>' +
        'Toque em <strong>"Permitir câmera"</strong> quando o navegador perguntar, ou verifique as permissões:<br><br>' +
        '📱 <strong>Android:</strong> toque no ícone 🔒 na barra de endereço → Permissões → Câmera<br>' +
        '🍎 <strong>iPhone:</strong> Ajustes → Safari → Câmera → Perguntar ou Permitir',
        true
      );
    } else {
      _showCamOverlay('Câmera não disponível neste dispositivo.', false);
    }
  }
}

// ── MAIN SCANNER (scan tab) ───────────────────────────────────────────────────
function _showCamOverlay(msg, showBtn = true) {
  const overlay = document.getElementById('cam-overlay');
  const msgEl   = document.getElementById('cam-msg');
  const btn     = document.getElementById('cam-btn');
  if (!overlay) return;
  overlay.style.display = 'flex';
  if (msgEl) msgEl.innerHTML = msg;
  if (btn)   btn.style.display = showBtn ? 'flex' : 'none';
}
function _hideCamOverlay() {
  const overlay = document.getElementById('cam-overlay');
  if (overlay) overlay.style.display = 'none';
}

async function requestCameraPermission() {
  const btn = document.getElementById('cam-btn');
  if (btn) { btn.textContent = 'Abrindo câmera…'; btn.disabled = true; }
  _startMainScan();
}

async function _startMainScan() {
  // Check permission state first if API is available
  if (navigator.permissions) {
    try {
      const perm = await navigator.permissions.query({ name: 'camera' });
      if (perm.state === 'denied') {
        _showCamOverlay(
          'Permissão de câmera foi <strong>negada</strong>.<br><br>' +
          'Para liberar:<br>' +
          '📱 <strong>Android:</strong> Configurações → Apps → Navegador → Permissões → Câmera<br>' +
          '🍎 <strong>iPhone:</strong> Ajustes → Safari/Chrome → Câmera → Permitir',
          false
        );
        return;
      }
    } catch(e) { /* permissions API not supported, proceed */ }
  }

  // Check if running on file:// (camera blocked by browsers)
  if (location.protocol === 'file:') {
    _showCamOverlay(
      'A câmera requer que o app esteja em um servidor.<br><br>' +
      'Abra o arquivo em um servidor local ou hospede online.<br>' +
      'Você ainda pode usar o app digitando os códigos manualmente.',
      false
    );
    return;
  }

  _hideCamOverlay();
  _startScan('main-video', _onMainCode);
}

function _stopMainScan() { _stopStream(); }

let _mainLast = '', _mainLastTime = 0;
function _onMainCode(code) {
  const now = Date.now();
  if (code === _mainLast && now - _mainLastTime < 2000) return;
  _mainLast = code; _mainLastTime = now;
  const product = state.products[code];
  if (!product) { showRegisterProduct(code); return; }
  if (state.scanMode === 'sale') handleSaleScan(code, product);
  else handleReturnScan(code, product);
}

// ── MODAL SCANNER (product form) ──────────────────────────────────────────────
let _modalScanOn = false;

function toggleModalScan() {
  if (_modalScanOn) {
    _modalScanOn = false;
    _stopModalScan();
  } else {
    _modalScanOn = true;
    const wrap = document.getElementById('modal-scan-wrap');
    const btn  = document.getElementById('modal-scan-btn');
    if (wrap) wrap.style.display = 'block';
    if (btn)  { btn.style.background = 'var(--accent)'; btn.style.borderColor = 'var(--accent)'; }
    _startScan('modal-video', (code) => {
      _modalScanOn = false;
      _stopStream();
      const inp  = document.getElementById('mp-code');
      const wrap = document.getElementById('modal-scan-wrap');
      const btn  = document.getElementById('modal-scan-btn');
      if (inp)  inp.value = code;
      if (wrap) wrap.style.display = 'none';
      if (btn)  { btn.style.background = 'var(--green)'; btn.style.borderColor = 'var(--green)'; btn.textContent = '✓'; }
      toast('Código lido com sucesso!');
      setTimeout(() => document.getElementById('mp-name')?.focus(), 150);
    });
  }
}

function _stopModalScan() {
  if (_modalScanOn) { _modalScanOn = false; }
  const wrap = document.getElementById('modal-scan-wrap');
  const btn  = document.getElementById('modal-scan-btn');
  if (wrap) wrap.style.display = 'none';
  if (btn)  { btn.style.background = 'var(--bg3)'; btn.style.borderColor = 'var(--border)'; btn.textContent = '📷'; }
  _stopStream();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(tab) {
  state.currentTab = tab;
  ['scan','clients','products','orders','settings'].forEach(t =>
    document.getElementById('nav-'+t).classList.toggle('active', t===tab));
  _stopMainScan();
  document.getElementById('total-slot').innerHTML = '';
  if      (tab==='scan')     renderScanTab();
  else if (tab==='clients')  renderClientsTab();
  else if (tab==='products') renderProductsTab();
  else if (tab==='orders')   renderOrdersTab();
  else if (tab==='settings') renderSettingsTab();
}

// ── SCAN TAB ──────────────────────────────────────────────────────────────────
function renderScanTab() {
  const client = state.activeClient ? state.clients[state.activeClient] : null;
  const order  = state.activeClient ? state.orders[state.activeClient]  : null;
  const items  = order ? Object.values(order.items) : [];

  const clientBanner = client
    ? `<div class="client-card" style="margin-bottom:16px;" onclick="showClientPicker()">
         <div class="client-avatar">${initials(client.name)}</div>
         <div class="client-info"><div class="client-name">${client.name}</div><div class="client-phone">${client.phone}</div></div>
         <div style="font-size:20px;color:var(--text2)">›</div>
       </div>`
    : `<button class="btn btn-outline" style="margin-bottom:16px;" onclick="showClientPicker()">👤 Selecionar / Novo Cliente</button>`;

  const itemsHtml = items.length ? `<div class="card">
    <div class="card-title">Itens no pedido</div>
    ${items.map(i=>`<div class="item-row">
      <div class="item-icon">📦</div>
      <div class="item-info"><div class="item-name">${i.name}</div><div class="item-code">${i.code}</div></div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${i.code}',-1)">−</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="changeQty('${i.code}',1)">+</button>
      </div>
      <div class="item-price">${fmt(i.price*i.qty)}</div>
    </div>`).join('')}
  </div>` : '';

  document.getElementById('main-content').innerHTML = `
    ${clientBanner}
    <div class="mode-bar">
      <button class="mode-opt ${state.scanMode==='sale'?'active':''}" onclick="setScanMode('sale')">🛒 Venda</button>
      <button class="mode-opt ${state.scanMode==='return'?'active':''}" onclick="setScanMode('return')">↩ Devolução</button>
    </div>
    <div class="scan-box" style="position:relative;">
      <video id="main-video" playsinline muted autoplay></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <span class="sc tl"></span><span class="sc tr"></span>
          <span class="sc bl"></span><span class="sc br"></span>
          <div class="scan-line"></div>
        </div>
      </div>
      <div id="cam-overlay" style="display:none;position:absolute;inset:0;background:rgba(15,15,18,0.96);flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;text-align:center;border-radius:var(--radius);">
        <div style="font-size:48px;">📷</div>
        <div style="font-size:16px;font-weight:700;">Acesso à câmera</div>
        <div id="cam-msg" style="font-size:13px;color:var(--text2);line-height:1.7;max-width:260px;"></div>
        <button class="btn btn-primary" id="cam-btn" style="width:auto;padding:12px 28px;" onclick="requestCameraPermission()">Permitir câmera</button>
      </div>
    </div>
    <div class="scan-status" id="scan-status-text">${state.scanMode==='sale'?'Aponte para o código do produto':'Escaneie o item para devolver'}</div>
    ${itemsHtml}
    ${client && items.length ? `<button class="btn btn-red" style="margin-top:4px;" onclick="finishOrder()">🏁 Ver resumo do pedido</button>` : ''}
    <div style="height:16px;"></div>
  `;

  document.getElementById('header-sub').textContent =
    client ? `Cliente: ${client.name}` : 'Selecione um cliente para iniciar';

  if (order && items.length) {
    document.getElementById('total-slot').innerHTML =
      `<div class="total-bar"><span class="total-label">Total do pedido</span><span class="total-value">${fmt(order.total)}</span></div>`;
  }

  // Check permission and start camera
  requestAnimationFrame(() => _startMainScan());
}

function setScanMode(m) { state.scanMode = m; renderScanTab(); }

function changeQty(code, delta) {
  const order = state.orders[state.activeClient];
  if (!order || !order.items[code]) return;
  order.items[code].qty   += delta;
  order.total = (order.total || 0) + delta * order.items[code].price;
  if (order.items[code].qty <= 0) delete order.items[code];
  save(); renderScanTab();
}

// ── SALE / RETURN ─────────────────────────────────────────────────────────────
function handleSaleScan(code, product) {
  if (!state.activeClient) { showSelectOrCreateClient(code, product); return; }
  addToOrder(code, product);
}
function handleReturnScan(code, product) {
  if (!state.activeClient) { toast('Selecione um cliente para devolução', 'error'); return; }
  const order = state.orders[state.activeClient];
  if (!order || !order.items[code] || order.items[code].qty <= 0) {
    toast('Item não está no pedido deste cliente', 'error'); return;
  }
  order.items[code].qty--;
  order.total -= product.price;
  if (order.items[code].qty === 0) delete order.items[code];
  save(); toast(`↩ Devolvido: ${product.name}`); renderScanTab();
}
function addToOrder(code, product) {
  if (!state.orders[state.activeClient])
    state.orders[state.activeClient] = { clientId: state.activeClient, items: {}, total: 0 };
  const order = state.orders[state.activeClient];
  if (order.items[code]) order.items[code].qty++;
  else order.items[code] = { code, name: product.name, price: product.price, qty: 1 };
  order.total = (order.total || 0) + product.price;
  save(); toast(`✓ ${product.name} adicionado`); renderScanTab();
}

function exportBackup() {
  const data = { version:1, exportedAt:new Date().toISOString(), products:state.products, clients:state.clients, orders:state.orders };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `consignado-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  localStorage.setItem('csn_last_backup', new Date().toLocaleString('pt-BR'));
  toast('Backup exportado!'); renderSettingsTab();
}

function importBackup(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.products || !data.clients || !data.orders) { toast('Arquivo inválido', 'error'); return; }
      showModal(`
        <div class="modal-handle"></div>
        <div class="modal-title">Confirmar restauração</div>
        <div class="modal-sub">Backup de ${new Date(data.exportedAt).toLocaleString('pt-BR')}. Dados atuais serão substituídos.</div>
        <div class="card" style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text2);">Produtos</span><strong>${Object.keys(data.products).length}</strong></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text2);">Clientes</span><strong>${Object.keys(data.clients).length}</strong></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;"><span style="color:var(--text2);">Pedidos</span><strong>${Object.keys(data.orders).length}</strong></div>
        </div>
        <div class="row">
          <div class="form-group"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button></div>
          <div class="form-group"><button class="btn btn-primary" onclick='applyBackup(${JSON.stringify(JSON.stringify(data))})'>Restaurar</button></div>
        </div>
      `);
    } catch(err) { toast('Erro ao ler o arquivo', 'error'); }
  };
  reader.readAsText(file);
}

function applyBackup(jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    state.products = data.products; state.clients = data.clients; state.orders = data.orders; state.activeClient = null;
    save(); closeModal(); toast('Backup restaurado!'); renderSettingsTab();
  } catch(e) { toast('Erro ao restaurar', 'error'); }
}

function clearAllData() {
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:var(--red);">Apagar tudo?</div>
    <div class="modal-sub">Todos os produtos, clientes e pedidos serão deletados. Não pode ser desfeito.</div>
    <div class="row" style="margin-top:8px;">
      <div class="form-group"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button></div>
      <div class="form-group"><button class="btn btn-red" onclick="confirmClearAll()">Apagar tudo</button></div>
    </div>
  `);
}
function confirmClearAll() {
  state.products={}; state.clients={}; state.orders={}; state.activeClient=null;
  save(); closeModal(); toast('Todos os dados apagados'); renderSettingsTab();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
showTab('scan');
</script>
</body>
</html>
