<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Teste Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;color:#fff;font-family:-apple-system,sans-serif;padding:16px;}
h2{font-size:18px;margin-bottom:12px;}
video{width:100%;border-radius:8px;background:#000;display:block;}
.box{background:#1a1a1a;border-radius:10px;padding:14px;margin-bottom:12px;}
.result{background:#1a3a1a;border:1px solid #22c55e;border-radius:8px;padding:12px;margin-top:12px;font-size:16px;font-weight:700;color:#22c55e;word-break:break-all;display:none;}
.log{background:#0a0a0a;border-radius:8px;padding:10px;font-size:11px;color:#666;height:120px;overflow-y:auto;margin-top:10px;font-family:monospace;}
button{width:100%;padding:14px;border-radius:8px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.btn-go{background:#6c63ff;color:#fff;}
.btn-stop{background:#ef4444;color:#fff;display:none;}
.status{font-size:13px;color:#999;margin-top:8px;text-align:center;}
select{width:100%;padding:10px;background:#222;color:#fff;border:1px solid #333;border-radius:8px;font-size:14px;margin-bottom:10px;}
</style>
</head>
<body>
<h2>🔍 Diagnóstico de Scanner</h2>

<div class="box">
  <div style="font-size:13px;color:#aaa;margin-bottom:10px;">Dispositivo: <span id="ua" style="color:#fff;"></span></div>
  <div style="font-size:13px;color:#aaa;margin-bottom:10px;">BarcodeDetector nativo: <span id="bd-support" style="color:#fff;"></span></div>
  <div style="font-size:13px;color:#aaa;">Protocol: <span id="proto" style="color:#fff;"></span></div>
</div>

<div class="box">
  <div style="font-size:13px;color:#aaa;margin-bottom:8px;">Biblioteca:</div>
  <select id="lib-select">
    <option value="native">BarcodeDetector Nativo (Chrome/Android)</option>
    <option value="quagga">Quagga2</option>
    <option value="zxing">ZXing</option>
  </select>
  <button class="btn-go" id="btn-start" onclick="startTest()">▶ Iniciar câmera</button>
  <button class="btn-stop" id="btn-stop" onclick="stopTest()">⏹ Parar</button>
  <div class="status" id="status">Aguardando…</div>
</div>

<div class="box" id="cam-box" style="display:none;">
  <video id="video" playsinline webkit-playsinline muted autoplay></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div class="result" id="result"></div>
  <div class="log" id="log"></div>
</div>

<script>
document.getElementById('ua').textContent = navigator.userAgent.slice(0,80);
document.getElementById('bd-support').textContent = 'BarcodeDetector' in window ? '✅ Sim' : '❌ Não';
document.getElementById('proto').textContent = location.protocol;

let _stream=null, _running=false, _rafId=null;

function log(msg){ const el=document.getElementById('log'); el.innerHTML+=msg+'<br>'; el.scrollTop=el.scrollHeight; }
function setStatus(msg){ document.getElementById('status').textContent=msg; }
function showResult(code){ const r=document.getElementById('result'); r.style.display='block'; r.textContent='✅ LIDO: '+code; }

async function startTest(){
  const lib=document.getElementById('lib-select').value;
  document.getElementById('cam-box').style.display='block';
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-stop').style.display='block';
  document.getElementById('log').innerHTML='';
  setStatus('Abrindo câmera…');
  log('Biblioteca: '+lib);

  try{
    try{
      _stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}});
      log('Camera: exact environment ✅');
    }catch(e){
      log('exact environment falhou: '+e.message);
      _stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      log('Camera: environment fallback ✅');
    }

    const video=document.getElementById('video');
    video.srcObject=_stream;
    video.setAttribute('playsinline','');
    video.setAttribute('webkit-playsinline','');
    video.muted=true;
    await new Promise((res,rej)=>{
      const t=setTimeout(()=>rej(new Error('timeout 8s')),8000);
      const go=()=>{clearTimeout(t);video.play().then(res).catch(rej);};
      video.readyState>=3?go():video.addEventListener('canplay',go,{once:true});
    });
    log('Video playing ✅ — '+video.videoWidth+'x'+video.videoHeight);
    setStatus('Câmera ativa — aponte para um código');
    _running=true;

    if(lib==='native') runNative(video);
    else if(lib==='quagga') runQuagga();
    else runZXing(video);

  }catch(err){
    log('ERRO: '+err.name+' — '+err.message);
    setStatus('Erro: '+err.message);
  }
}

// ── NATIVE BarcodeDetector ──
async function runNative(video){
  if(!('BarcodeDetector' in window)){log('BarcodeDetector não disponível'); return;}
  const det=new BarcodeDetector({formats:['qr_code','ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf','data_matrix','aztec','pdf417','codabar']});
  log('BarcodeDetector iniciado');
  let last='',lastT=0;
  const loop=async()=>{
    if(!_running) return;
    try{
      if(video.readyState>=2){
        const r=await det.detect(video);
        if(r.length){
          const code=r[0].rawValue;
          if(code!==last||Date.now()-lastT>2000){last=code;lastT=Date.now();log('DETECTADO: '+code);showResult(code);}
        }
      }
    }catch(e){log('detect err: '+e.message);}
    if(_running) _rafId=requestAnimationFrame(loop);
  };
  _rafId=requestAnimationFrame(loop);
}

// ── QUAGGA2 ──
function runQuagga(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js';
  s.onload=()=>{
    log('Quagga2 carregado ✅');
    Quagga.init({
      inputStream:{type:'LiveStream',target:document.getElementById('cam-box'),
        constraints:{facingMode:'environment'},area:{top:'10%',right:'5%',left:'5%',bottom:'10%'}},
      locator:{patchSize:'medium',halfSample:true},
      numOfWorkers:0, frequency:5,
      decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader','upc_e_reader','qr_code_reader']},
      locate:true
    },(err)=>{
      if(err){log('Quagga init err: '+JSON.stringify(err));return;}
      log('Quagga iniciado ✅');
      Quagga.start();
    });
    let last='',lastT=0;
    Quagga.onDetected((r)=>{
      const code=r&&r.codeResult&&r.codeResult.code;
      if(!code) return;
      if(code!==last||Date.now()-lastT>2000){last=code;lastT=Date.now();log('DETECTADO: '+code);showResult(code);}
    });
  };
  s.onerror=()=>log('Quagga falhou ao carregar');
  document.head.appendChild(s);
}

// ── ZXING canvas loop ──
function runZXing(video){
  const s=document.createElement('script');
  s.src='https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
  s.onload=()=>{
    log('ZXing carregado ✅');
    const hints=new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
      ZXing.BarcodeFormat.QR_CODE,ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.UPC_A,ZXing.BarcodeFormat.UPC_E
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
    const reader=new ZXing.MultiFormatReader();
    reader.setHints(hints);
    const c=document.getElementById('canvas');
    const x=c.getContext('2d',{willReadFrequently:true});
    let tick=0,last='',lastT=0;
    log('ZXing iniciado — aguardando frames…');
    setTimeout(()=>{
      const loop=()=>{
        if(!_running) return;
        tick++;
        if(tick%4===0&&video.readyState>=2&&video.videoWidth>0){
          try{
            const W=480,H=Math.round(480*(video.videoHeight/video.videoWidth));
            c.width=W;c.height=H;
            x.drawImage(video,0,0,W,H);
            const id=x.getImageData(0,0,W,H);
            const rgba=id.data;
            const rgb=new Uint8ClampedArray(W*H*3);
            for(let i=0,j=0;i<rgba.length;i+=4,j+=3){rgb[j]=rgba[i];rgb[j+1]=rgba[i+1];rgb[j+2]=rgba[i+2];}
            const lum=new ZXing.RGBLuminanceSource(rgb,W,H);
            const bmp=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
            try{
              const r=reader.decode(bmp);
              if(r){
                const code=r.getText();
                if(code!==last||Date.now()-lastT>2000){last=code;lastT=Date.now();log('DETECTADO: '+code);showResult(code);}
              }
            }catch(e){/*NotFoundException*/}
          }catch(e){if(tick%100===0) log('frame err: '+e.message);}
        }
        if(_running) _rafId=requestAnimationFrame(loop);
      };
      _rafId=requestAnimationFrame(loop);
    },800);
  };
  s.onerror=()=>log('ZXing falhou ao carregar');
  document.head.appendChild(s);
}

function stopTest(){
  _running=false;
  if(_rafId){cancelAnimationFrame(_rafId);_rafId=null;}
  if(_stream){_stream.getTracks().forEach(t=>t.stop());_stream=null;}
  try{if(typeof Quagga!=='undefined'){Quagga.stop();Quagga.offDetected();}}catch(e){}
  document.getElementById('cam-box').style.display='none';
  document.getElementById('btn-start').style.display='block';
  document.getElementById('btn-stop').style.display='none';
  setStatus('Parado.');
}
</script>
</body>
</html>
